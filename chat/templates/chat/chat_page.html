<!doctype html>
<html>
  <head>
    <title>Document QA System</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        padding: 40px;
      }

      .container {
        max-width: 800px;
        margin: auto;
        background: white;
        padding: 30px;
        border-radius: 10px;
      }

      .auto-text {
        unicode-bidi: plaintext;
        direction: auto;
        text-align: start;
      }

      textarea {
        width: 100%;
        height: 120px;
        padding: 12px;
        font-size: 16px;

        unicode-bidi: plaintext;
        direction: auto;
        text-align: start;
      }

      button {
        margin-top: 12px;
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
      }

      .answer {
        margin-top: 30px;
        padding: 20px;
        background: #eef6ff;
        border-radius: 8px;
        white-space: pre-wrap;
      }

      .question {
        margin-top: 20px;
        color: #555;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Document Question Answering</h1>

      <form method="POST">
        {% csrf_token %}

        <label>Ask a question based on your documents:</label>

        <textarea
          name="question"
          required
          class="auto-text"
        >{{ question|default:"" }}</textarea>

        <br />

        <button type="submit">Ask</button>
      </form>

      {% if answer %}

      <div class="question auto-text">
        <strong>Question:</strong>
        {{ question }}
      </div>

      <div class="answer auto-text">
        <strong>Answer:</strong>
        <br />
        {{ answer }}
      </div>

      {% endif %}
    </div>
  </body>
</html>
